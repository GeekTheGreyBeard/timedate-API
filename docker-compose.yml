services:
  timedate-app:
    build: .
    container_name: timedate-app
    ports:
      - "8200:8200"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "POST", "http://localhost:8200/api/timedate", "-H", "Content-Type: application/json", "-d", '{"timezone": "Europe/London"}']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s 
